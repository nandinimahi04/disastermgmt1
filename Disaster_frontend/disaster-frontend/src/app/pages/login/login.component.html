<nav class="top-nav glass-card">
    <div class="logo-area">
        <a routerLink="/" class="logo">NEXA</a>
    </div>
    <div class="nav-links">
        <a routerLink="/register">New here? <span class="text-primary font-bold">Register</span></a>
    </div>
</nav>

<div class="auth-wrapper">
    <div class="auth-card premium-card">
        <div class="auth-header">
            <h1 class="auth-title">Welcome Back</h1>
            <p class="text-tertiary">Please log in to your account.</p>
        </div>

        <form class="auth-form" (ngSubmit)="login()">
            <div class="input-group">
                <label>Username</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" [(ngModel)]="loginObj.email" name="email" placeholder="Your Username" required>
                </div>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" [(ngModel)]="loginObj.password" name="password" placeholder="••••••••"
                        required>
                </div>
            </div>

            <div class="auth-actions">
                <button type="submit" class="btn-nexa-primary full">Log In</button>
            </div>

            <div class="auth-footer">
                <a href="#">Forgot Password?</a>
                <span class="divider"></span>
                <a href="#">Need Help?</a>
            </div>
        </form>
    </div>

    <div class="auth-status">
        <span class="status-indicator"></span> Connection Secure
    </div>
</div>

<footer class="bottom-footer glass-card">
    <div class="footer-logo text-gradient">NEXA</div>
    <div class="footer-links">
        <span>© 2026 NEXA Corporation</span>
        <a href="#">Terms</a>
        <a href="#">Privacy</a>
        <a href="#">Cookies</a>
    </div>
    <div class="footer-support">Professional Support</div>
</footer>
